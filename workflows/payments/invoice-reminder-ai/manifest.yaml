id: invoice-reminder-ai
name: Invoice Reminder AI
category: payments
version: 0.1.0
status: stable
platforms:
  - n8n
required_integrations:
  - Google Sheets
  - OpenAI-compatible LLM
  - Telegram
inputs:
  - invoices.csv
outputs:
  - reminder_draft_messages
  - telegram_notifications
risk_level: medium
human_approval_required: true
description: >
  Scans active invoice statuses to draft customized payment reminder templates (soft, moderate, strict) aligned with customer relationship styles and due-date delays.
