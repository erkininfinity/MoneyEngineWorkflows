name: Validate Workflows

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'workflows/**'
      - 'packages/cli/**'
      - 'prompts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.github/workflows/validate-workflows.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'workflows/**'
      - 'packages/cli/**'
      - 'prompts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'eslint.config.js'
      - '.github/workflows/validate-workflows.yml'

jobs:
  validate:
    name: Validate Workflow Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build CLI
        run: npm run build

      - name: Run workflow validator
        run: npm run validate

      - name: List all workflows
        run: npm run list
